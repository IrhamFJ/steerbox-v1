<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steerbox v1 | Final Stable</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #ffcc00; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; text-align: center; overflow: hidden; user-select: none; }
        .screen { display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; }
        .btn { padding: 20px; margin: 10px; border: 2px solid var(--gold); background: rgba(255,204,0,0.1); color: var(--gold); font-weight: bold; border-radius: 15px; width: 80%; max-width: 300px; text-transform: uppercase; cursor: pointer; }
        #wheel { width: 250px; height: 250px; border: 15px solid var(--gold); border-radius: 50%; position: relative; transition: transform 0.1s ease-out; margin: 20px 0; }
        #wheel::after { content: ''; position: absolute; top: -10px; left: 50%; width: 14px; height: 40px; background: red; transform: translateX(-50%); border-radius: 5px; }
        #angle-val { font-size: 5rem; font-weight: 900; color: var(--gold); margin: 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menu" class="screen">
        <h1 style="color: var(--gold); letter-spacing: 5px;">STEERBOX V1</h1>
        <button class="btn" onclick="pilihMode('host')">HP 1: MONITOR (ROBLOX)</button>
        <button class="btn" onclick="pilihMode('controller')">HP 2: SETIR (GYRO)</button>
    </div>

    <div id="view-host" class="screen hidden">
        <div id="status" style="color: gray;">WAITING...</div>
        <div id="wheel"></div>
        <h1 id="out-angle">0°</h1>
    </div>

    <div id="view-controller" class="screen hidden">
        <h1 id="angle-val">0°</h1>
        <p style="color:#888;">Posisi: Portrait 0°</p>
        <button class="btn" style="width: 120px; padding: 10px; font-size: 0.7rem;" onclick="location.reload()">RE-CALIBRATE</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDoRRWghIvga-VOoqaTsTr91vUoP47-PxSw",
        authDomain: "steerbox-irham.firebaseapp.com",
        databaseURL: "https://steerbox-irham-default-rtdb.firebaseio.com",
        projectId: "steerbox-irham",
        storageBucket: "steerbox-irham.firebasestorage.app",
        messagingSenderId: "403591896090",
        appId: "1:403591896090:web:79a0fb3f8bcbd02101c5a3"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database().ref('steer_v1');

    function pilihMode(m) {
        document.getElementById('menu').classList.add('hidden');
        if (m === 'host') {
            document.getElementById('view-host').classList.remove('hidden');
            db.on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    document.getElementById('status').innerText = "CONNECTED";
                    document.getElementById('status').style.color = "lime";
                    document.getElementById('wheel').style.transform = `rotate(${data.angle}deg)`;
                    document.getElementById('out-angle').innerText = data.angle + "°";
                }
            });
        } else {
            document.getElementById('view-controller').classList.remove('hidden');
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(initSensors).catch(() => alert("Izin sensor ditolak!"));
            } else {
                initSensors();
            }
        }
    }

    function initSensors() {
        window.addEventListener('deviceorientation', (e) => {
            // Kita pakai Gamma (kemiringan kiri-kanan)
            // Dan Beta (kemiringan depan-belakang)
            let g = e.gamma; 
            let b = e.beta;

            // Logika Deteksi: Jika HP dalam posisi portrait (beta > 0)
            let radian = Math.atan2(g, b);
            let angle = Math.round(radian * (180 / Math.PI));

            // KALIBRASI ARAH (Inverted Fix)
            // Agar miring kanan = Positif, miring kiri = Negatif
            let finalAngle = angle;

            // Memastikan Portrait Kebalik Prefer -180
            if (finalAngle > 180) finalAngle -= 360;
            if (finalAngle < -180) finalAngle += 360;

            // Deadzone (2 derajat) biar anteng
            if (Math.abs(finalAngle) < 2) finalAngle = 0;

            document.getElementById('angle-val').innerText = finalAngle + "°";
            db.set({ angle: finalAngle });
        }, true);
    }
</script>
</body>
</html>
