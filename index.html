<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SteeringWHEEL2PLAY | Irham Build</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --gold: #ffcc00; --bg: #0a0a0a; --red: #ff4444; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; user-select: none; }
        .screen { display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; }
        .btn { padding: 20px; margin: 10px; border: 2px solid var(--gold); background: none; color: var(--gold); font-weight: bold; border-radius: 12px; cursor: pointer; width: 85%; max-width: 300px; text-transform: uppercase; font-size: 1rem; }
        .btn:active { background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); }
        
        /* Visual Setir */
        #wheel { 
            width: 240px; height: 240px; border: 15px solid var(--gold); border-radius: 50%; 
            position: relative; transition: transform 0.1s linear; 
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3); margin: 20px 0;
        }
        #wheel::after { content: ''; position: absolute; top: -5px; left: 50%; width: 12px; height: 45px; background: var(--red); transform: translateX(-50%); border-radius: 5px; }
        
        #angle-val { font-size: 5rem; font-weight: 900; color: var(--gold); margin: 0; }
        .info { color: #555; font-size: 0.8rem; margin-top: 10px; }
        .status { font-weight: bold; padding: 5px 15px; border-radius: 20px; background: #222; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="menu" class="screen">
        <h1 style="color: var(--gold); letter-spacing: 2px;">SteeringWHEEL2PLAY</h1>
        <button class="btn" onclick="pilihMode('host')">HP 1: PENERIMA SINYAL</button>
        <button class="btn" onclick="pilihMode('controller')">HP 2: SETIR (SENDER)</button>
        <p class="info">com.irham.steerbox.v1</p>
    </div>

    <div id="view-host" class="screen hidden">
        <div id="status" class="status" style="color: #666;">OFFLINE</div>
        <div id="wheel"></div>
        <h1 id="out-angle">0°</h1>
        <p id="action-hint" style="color: #888;">Nyalakan MacroDroid di HP ini</p>
    </div>

    <div id="view-controller" class="screen hidden">
        <div class="status" style="color: var(--gold);">SENDER ACTIVE</div>
        <h1 id="angle-val">0°</h1>
        <p>Landscape: 0° | Kebalik: 180°</p>
        <button class="btn" style="width: 150px; padding: 10px;" onclick="location.reload()">BACK</button>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDoRRWghIvga-VOoqaTsTr91vUoP47-PxSw",
        authDomain: "steerbox-irham.firebaseapp.com",
        databaseURL: "https://steerbox-irham-default-rtdb.firebaseio.com",
        projectId: "steerbox-irham",
        storageBucket: "steerbox-irham.firebasestorage.app",
        messagingSenderId: "403591896090",
        appId: "1:403591896090:web:79a0fb3f8bcbd02101c5a3"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database().ref('steer_v1');

    function pilihMode(m) {
        document.getElementById('menu').classList.add('hidden');
        if (m === 'host') {
            document.getElementById('view-host').classList.remove('hidden');
            db.on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    document.getElementById('status').innerText = "CONNECTED";
                    document.getElementById('status').style.color = "lime";
                    document.getElementById('wheel').style.transform = `rotate(${data.angle}deg)`;
                    document.getElementById('out-angle').innerText = data.angle + "°";
                }
            });
        } else {
            document.getElementById('view-controller').classList.remove('hidden');
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(initSensors);
            } else {
                initSensors();
            }
        }
    }

    function initSensors() {
        window.addEventListener('deviceorientation', (e) => {
            let x = e.beta;  
            let y = e.gamma; 
            let radian = Math.atan2(y, x);
            let angle = Math.round(radian * (180 / Math.PI));
            let finalAngle = - (angle - 90);

            if (finalAngle < -180) finalAngle += 360;
            if (finalAngle > 180) finalAngle -= 360;

            document.getElementById('angle-val').innerText = finalAngle + "°";
            
            // Kirim data ke Firebase
            db.set({ angle: finalAngle, time: Date.now() });
        });
    }
</script>
</body>
</html>
